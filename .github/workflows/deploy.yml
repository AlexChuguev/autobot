name: Deploy Elicomp

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: "3.11"

      - name: Regenerate facets
        run: python3 scripts/generate_facets.py

      - name: Commit regenerated facets
        run: |
          if git diff --quiet -- data/facets.json; then
            echo "No facets changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/facets.json
          git commit -m "chore: regenerate facets"
          git push

      - name: Run deploy script on VPS
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd /var/www/ecommerce-site
            if [ -x ./deploy/deploy_from_github.sh ]; then
              bash ./deploy/deploy_from_github.sh
            else
              /usr/local/bin/deploy-elicomp.sh
            fi
